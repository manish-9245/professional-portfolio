    <style>
      /* ── Blog post prose ─────────────────────────────────── */
      .blog-post-layout {
        display: grid;
        grid-template-columns: 220px 1fr 200px;
        gap: 2rem;
        align-items: start;
        max-width: var(--surface-max);
        margin: 0 auto;
        padding: 0 1rem 3rem;
      }

      /* TOC sidebar */
      .blog-toc {
        position: sticky;
        top: 7rem;
        margin-top: 2rem;
        max-height: calc(100vh - 8rem);
        overflow-y: auto;
        font-size: 0.82rem;
        line-height: 1.5;
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 12%, transparent));
        border-radius: 12px;
        padding: 0.9rem;
        background: color-mix(
          in srgb,
          var(--o-bg, transparent) 96%,
          transparent
        );
      }

      .blog-toc-title {
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        opacity: 0.65;
        margin: 0 0 0.7rem;
        font-weight: 650;
      }

      .blog-toc ol {
        margin: 0;
        padding: 0;
      }

      .blog-toc li {
        margin-bottom: 0.22rem;
        list-style: none;
        padding: 0;
      }

      .blog-toc a {
        opacity: 0.76;
        text-decoration: none;
        display: block;
        padding: 0.25rem 0.45rem;
        border-radius: 8px;
        transition:
          opacity 0.15s,
          background-color 0.15s;
      }

      .blog-toc a:hover,
      .blog-toc a.active {
        opacity: 1;
        font-weight: 600;
        background: color-mix(in srgb, currentColor 10%, transparent);
      }

      .toc-h3 {
        padding-left: 0.65rem;
      }

      /* Main prose */
      .blog-prose {
        min-width: 0;
        line-height: 1.75;
      }

      .blog-prose h1,
      .blog-prose h2,
      .blog-prose h3,
      .blog-prose h4 {
        margin-top: 2rem;
        margin-bottom: 0.6rem;
        line-height: 1.3;
        scroll-margin-top: 5rem;
      }

      .blog-prose h1 {
        font-size: 1.6rem;
      }
      .blog-prose h2 {
        font-size: 1.25rem;
        border-bottom: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 12%, transparent));
        padding-bottom: 0.3rem;
      }
      .blog-prose h3 {
        font-size: 1.05rem;
      }

      .blog-prose p {
        margin: 0 0 1rem;
      }

      .blog-prose img {
        max-width: 100%;
        border-radius: 10px;
        margin: 1.2rem 0;
        display: block;
        cursor: zoom-in;
      }

      .blog-prose pre {
        border-radius: 10px;
        overflow-x: auto;
        margin: 1.2rem 0;
        font-size: 0.88rem;
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 12%, transparent));
        position: relative;
      }

      .blog-prose pre code {
        display: block;
        padding: 1rem 1.2rem;
        background: none !important;
      }

      .code-block-shell {
        position: relative;
        margin: 1.2rem 0;
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 12%, transparent));
        border-radius: 12px;
        overflow: hidden;
        background: color-mix(in srgb, var(--o-bg, canvas) 98%, transparent);
      }

      .code-window-bar {
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        padding: 0 0.7rem;
        border-bottom: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 12%, transparent));
        background: color-mix(in srgb, currentColor 5%, transparent);
      }

      .code-window-controls {
        display: inline-flex;
        align-items: center;
        gap: 0.38rem;
      }

      .code-window-dot {
        width: 0.74rem;
        height: 0.74rem;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.52rem;
        line-height: 1;
        font-weight: 700;
        opacity: 0.95;
      }

      .code-window-dot.close {
        background: color-mix(in srgb, currentColor 22%, transparent);
        color: color-mix(in srgb, currentColor 86%, transparent);
      }

      .code-window-dot.minimize {
        background: color-mix(in srgb, currentColor 16%, transparent);
        color: color-mix(in srgb, currentColor 82%, transparent);
      }

      .code-window-dot.maximize {
        background: color-mix(in srgb, currentColor 12%, transparent);
        color: color-mix(in srgb, currentColor 78%, transparent);
      }

      .code-block-shell pre {
        margin: 0;
        border: 0;
        border-radius: 0;
      }

      .code-copy-button {
        position: absolute;
        top: 0.3rem;
        right: 0.5rem;
        z-index: 1;
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 15%, transparent));
        background: color-mix(in srgb, var(--o-bg, canvas) 92%, transparent);
        color: inherit;
        border-radius: 999px;
        padding: 0.28rem 0.7rem;
        font: inherit;
        font-size: 0.78rem;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          opacity 0.15s ease;
        opacity: 0.92;
      }

      .code-copy-button:hover {
        transform: translateY(-1px);
        opacity: 1;
      }

      .code-copy-button.is-copied {
        font-weight: 600;
      }

      .blog-prose :not(pre) > code {
        background: color-mix(in srgb, currentColor 8%, transparent);
        border-radius: 4px;
        padding: 0.15em 0.4em;
        font-size: 0.875em;
      }

      .blog-prose blockquote {
        border-left: 3px solid
          var(--o-border, color-mix(in srgb, currentColor 20%, transparent));
        margin: 1rem 0;
        padding: 0.5rem 1rem;
        opacity: 0.8;
      }

      .blog-prose table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
        font-size: 0.9rem;
      }

      .blog-prose th,
      .blog-prose td {
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 15%, transparent));
        padding: 0.5rem 0.75rem;
        text-align: left;
      }

      .blog-prose th {
        font-weight: 650;
        background: color-mix(in srgb, currentColor 4%, transparent);
      }

      .blog-prose ul,
      .blog-prose ol {
        padding-left: 1.4rem;
        margin: 0 0 1rem;
      }

      .blog-prose li {
        margin-bottom: 0.3rem;
      }

      .blog-prose a {
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .blog-prose hr {
        border: 0;
        border-top: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 15%, transparent));
        margin: 2rem 0;
      }

      /* Right meta column */
      .blog-meta-col {
        position: sticky;
        top: 7rem;
        margin-top: 2rem;
        font-size: 0.82rem;
        display: grid;
        gap: 0.7rem;
      }

      .blog-meta-card {
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 12%, transparent));
        border-radius: 12px;
        padding: 0.8rem 0.85rem;
        background: color-mix(
          in srgb,
          var(--o-bg, transparent) 96%,
          transparent
        );
      }

      .blog-meta-label {
        margin: 0;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        opacity: 0.62;
      }

      .blog-meta-value {
        margin: 0.28rem 0 0;
        line-height: 1.4;
        font-size: 0.88rem;
      }

      .blog-meta-link {
        display: inline-block;
        margin-top: 0.2rem;
        font-size: 0.82rem;
      }

      .blog-view-counter {
        margin-top: 0.3rem;
      }

      .blog-view-counter img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      /* Post header */
      .blog-post-header {
        max-width: var(--surface-max);
        margin: 0 auto;
        padding: 2rem 1rem 1.5rem;
        border-bottom: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 12%, transparent));
        margin-bottom: 0;
      }

      .blog-post-header h1 {
        font-size: clamp(1.5rem, 4vw, 2.2rem);
        line-height: 1.2;
        margin: 0.5rem 0 0.75rem;
        text-wrap: balance;
      }

      /* Error / loading */
      .blog-loading,
      .blog-error {
        text-align: center;
        padding: 4rem 1rem;
        opacity: 0.6;
      }

      .blog-image-modal {
        width: min(1100px, 94vw);
        max-width: 1100px;
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 15%, transparent));
        border-radius: 16px;
        padding: 0;
        overflow: hidden;
        background: var(--o-bg, canvas);
        opacity: 0;
        transform: translateY(10px) scale(0.985);
        transition:
          opacity 0.2s ease,
          transform 0.24s ease;
      }

      .blog-image-modal[open] {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .blog-image-modal.is-closing {
        opacity: 0;
        transform: translateY(8px) scale(0.99);
      }

      .blog-image-modal::backdrop {
        background: color-mix(in srgb, black 74%, transparent);
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .blog-image-modal[open]::backdrop {
        opacity: 1;
      }

      .blog-image-modal.is-closing::backdrop {
        opacity: 0;
      }

      .blog-image-modal-shell {
        display: grid;
        gap: 0;
      }

      .blog-image-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.9rem 1rem;
        border-bottom: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 15%, transparent));
      }

      .blog-image-modal-header button {
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 15%, transparent));
        background: transparent;
        color: inherit;
        border-radius: 999px;
        padding: 0.3rem 0.75rem;
        cursor: pointer;
      }

      .blog-image-modal-body {
        padding: 1rem;
        display: grid;
        grid-template-areas:
          "media"
          "caption";
        gap: 0.75rem;
        justify-items: center;
      }

      .blog-image-loader {
        grid-area: media;
        width: min(var(--media-w, 640px), 100%);
        height: min(var(--media-h, 360px), 78vh);
        max-width: 100%;
        margin: 0 auto;
        border-radius: 12px;
        overflow: hidden;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.22s ease;
      }

      .blog-image-loader.is-active {
        opacity: 1;
        visibility: visible;
      }

      .blog-image-modal-body img {
        grid-area: media;
        max-width: 100%;
        max-height: 78vh;
        width: min(var(--media-w, 640px), 100%);
        height: min(var(--media-h, 360px), 78vh);
        object-fit: contain;
        margin: 0 auto;
        display: block;
        border-radius: 12px;
        opacity: 0;
        transform: scale(0.992);
        transition:
          opacity 0.22s ease,
          transform 0.26s ease;
      }

      .blog-image-modal-body img.is-ready {
        opacity: 1;
        transform: scale(1);
      }

      .blog-image-caption {
        grid-area: caption;
        display: none;
        margin: 0.75rem 0 0;
        text-align: center;
        opacity: 0.75;
      }

      .blog-image-caption.is-visible {
        display: block;
      }

      .related-posts {
        padding-top: 0.4rem;
        padding-bottom: 2.2rem;
      }

      .related-posts h2 {
        margin: 0 0 0.9rem;
        font-size: 1.15rem;
      }

      .related-posts-grid {
        display: grid;
        gap: 0.85rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .blog-share {
        padding-top: 0.2rem;
        padding-bottom: 2rem;
      }

      .blog-share h2 {
        margin: 0 0 0.9rem;
        font-size: 1.1rem;
      }

      .blog-share-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .blog-share-link,
      .blog-share-copy {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 15%, transparent));
        border-radius: 999px;
        min-width: 2.5rem;
        min-height: 2.5rem;
        width: 2.5rem;
        height: 2.5rem;
        padding: 0;
        font-size: 0.82rem;
        line-height: 1.1;
        text-decoration: none;
        color: inherit;
        background: color-mix(in srgb, var(--o-bg, canvas) 96%, transparent);
        transition:
          border-color 0.15s ease,
          background-color 0.15s ease,
          transform 0.15s ease;
      }

      .blog-share-copy {
        font: inherit;
        cursor: pointer;
      }

      .blog-share-link:hover,
      .blog-share-copy:hover {
        border-color: color-mix(in srgb, currentColor 28%, transparent);
        background: color-mix(in srgb, currentColor 8%, transparent);
        transform: translateY(-1px);
      }

      .blog-share-link:focus-visible,
      .blog-share-copy:focus-visible {
        outline: 2px solid color-mix(in srgb, currentColor 30%, transparent);
        outline-offset: 2px;
      }

      .blog-share-icon {
        width: 1rem;
        height: 1rem;
        display: block;
        fill: currentColor;
        flex-shrink: 0;
      }

      .related-card {
        border: 1px solid
          var(--o-border, color-mix(in srgb, currentColor 14%, transparent));
        border-radius: 12px;
        padding: 0.85rem;
        background: color-mix(
          in srgb,
          var(--o-bg, transparent) 96%,
          transparent
        );
      }

      .related-card p {
        margin: 0;
      }

      .related-meta {
        display: inline-flex;
        gap: 0.35rem;
        align-items: center;
        font-size: 0.76rem;
        opacity: 0.72;
      }

      .related-title {
        margin: 0.4rem 0 0.35rem;
        font-size: 0.94rem;
        line-height: 1.38;
      }

      .related-title a {
        text-decoration: none;
      }

      .related-title a:hover {
        text-decoration: underline;
      }

      .related-desc {
        font-size: 0.84rem;
        line-height: 1.5;
        opacity: 0.82;
      }

      /* Dark mode code */
      [data-theme="dark"] #hljs-theme-light {
        display: none !important;
      }
      [data-theme="dark"] #hljs-theme-dark {
        display: unset !important;
      }
      [data-theme="light"] #hljs-theme-dark {
        display: none !important;
      }

      @media (max-width: 900px) {
        .blog-post-layout {
          grid-template-columns: 1fr;
        }
        .blog-toc,
        .blog-meta-col {
          display: none;
        }

        .related-posts-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <script>
      // ── Frontmatter parser ────────────────────────────────
      function parseFrontmatter(text) {
        const m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
        if (!m) return { meta: {}, body: text };
        const meta = {};
        m[1].split("\n").forEach((line) => {
          const idx = line.indexOf(":");
          if (idx === -1) return;
          const key = line.slice(0, idx).trim();
          const val = line
            .slice(idx + 1)
            .trim()
            .replace(/^"|"$/g, "");
          meta[key] = val;
        });
        return { meta, body: m[2] };
      }

      // ── Format date ────────────────────────────────────────
      function fmtDate(iso) {
        try {
          return new Date(iso + "T00:00:00").toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        } catch {
          return iso;
        }
      }

      function slugToTitle(slug) {
        return (slug || "")
          .replace(/[-_]+/g, " ")
          .replace(/\b\w/g, (m) => m.toUpperCase());
      }

      function toAbsoluteUrl(value, baseUrl = window.location.href) {
        if (!value) {
          return "";
        }

        try {
          return new URL(value, baseUrl).href;
        } catch {
          return value;
        }
      }

      function extractFirstMarkdownImage(markdown = "") {
        const imageMatch = markdown.match(
          /!\[[^\]]*\]\(([^)\s]+)(?:\s+"[^"]*")?\)/,
        );
        return imageMatch ? imageMatch[1].trim() : "";
      }

      function getPostPermalink(slug) {
        return `https://buildwithmanish.com/posts/${encodeURIComponent(slug)}.html`;
      }

      function getViewCounterBadgeSrc(pageUrl) {
        const endpoint = "https://hitscounter.dev/api/hit";
        const params = new URLSearchParams({
          url: pageUrl,
          label: "blog views",
          icon: "eye",
          color: "#198754",
          message: "",
          style: "flat",
          tz: "Indian/Christmas",
        });
        return `${endpoint}?${params.toString()}`;
      }

      function readSessionJson(key) {
        try {
          const raw = sessionStorage.getItem(key);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function writeSessionJson(key, value) {
        try {
          sessionStorage.setItem(key, JSON.stringify(value));
        } catch {
          // ignore storage failures
        }
      }

      async function getBlogIndexForPage() {
        const cacheKey = "blog-index-cache-v2";
        const ttlMs = 5 * 60 * 1000;
        const cached = readSessionJson(cacheKey);
        const now = Date.now();

        if (
          cached &&
          Array.isArray(cached.data) &&
          now - cached.timestamp < ttlMs
        ) {
          return cached.data;
        }

        const response = await fetch("./posts/index.json");
        if (!response.ok) {
          throw new Error("Failed to load blog index");
        }

        const posts = await response.json();
        writeSessionJson(cacheKey, { timestamp: now, data: posts });
        return posts;
      }

      // ── Build TOC from rendered HTML ───────────────────────
      function buildToc(container) {
        const headings = [...container.querySelectorAll("h2, h3")];
        if (headings.length < 2) return "";
        const items = headings.map((h) => {
          const id =
            h.id ||
            h.textContent
              .trim()
              .toLowerCase()
              .replace(/[^\w]+/g, "-");
          h.id = id;
          const cls = h.tagName === "H3" ? ' class="toc-h3"' : "";
          return `<li${cls}><a href="#${id}">${h.textContent}</a></li>`;
        });
        return `<p class="blog-toc-title">Contents</p><ol>${items.join("")}</ol>`;
      }

      // ── Active TOC highlight on scroll ────────────────────
      function initTocScroll(toc) {
        const links = [...toc.querySelectorAll("a")];
        if (!links.length) return;
        const obs = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                links.forEach((l) => l.classList.remove("active"));
                const active = links.find(
                  (l) => l.getAttribute("href") === "#" + e.target.id,
                );
                if (active) active.classList.add("active");
              }
            });
          },
          { rootMargin: "-60px 0px -70% 0px" },
        );
        document
          .querySelectorAll("h2[id], h3[id]")
          .forEach((h) => obs.observe(h));
      }

      function initializeImageModal(container) {
        const modal = document.getElementById("blog-image-modal");
        const modalBody = modal
          ? modal.querySelector(".blog-image-modal-body")
          : null;
        const modalImg = document.getElementById("blog-image-modal-img");
        const modalLoader = document.getElementById("blog-image-modal-loader");
        const modalCaption = document.getElementById(
          "blog-image-modal-caption",
        );
        const closeButton = document.getElementById("blog-image-modal-close");

        if (
          !modal ||
          !modalBody ||
          !modalImg ||
          !modalLoader ||
          !modalCaption ||
          !closeButton ||
          !container
        ) {
          return;
        }

        const calculateRenderSize = (img) => {
          const naturalWidth = img.naturalWidth || 640;
          const naturalHeight = img.naturalHeight || 360;
          const maxWidth = Math.max(160, modalBody.clientWidth || 640);
          const maxHeight = Math.max(
            120,
            Math.round(window.innerHeight * 0.78),
          );

          const widthRatio = maxWidth / naturalWidth;
          const heightRatio = maxHeight / naturalHeight;
          const scale = Math.min(widthRatio, heightRatio, 1);

          return {
            width: Math.max(160, Math.round(naturalWidth * scale)),
            height: Math.max(120, Math.round(naturalHeight * scale)),
          };
        };

        const applyModalMediaSize = (img) => {
          const { width, height } = calculateRenderSize(img);

          modalBody.style.setProperty("--media-w", `${width}px`);
          modalBody.style.setProperty("--media-h", `${height}px`);
        };

        const showLoader = () => {
          modalLoader.classList.add("is-active");
        };

        const hideLoader = () => {
          modalLoader.classList.remove("is-active");
        };

        const closeModal = () => {
          if (!modal.open || modal.dataset.closing === "true") {
            return;
          }

          modal.dataset.closing = "true";
          modal.classList.add("is-closing");

          window.setTimeout(() => {
            modal.close();
            modal.classList.remove("is-closing");
            modal.dataset.closing = "false";
          }, 190);
        };

        const revealModalImage = () => {
          modalImg.classList.add("is-ready");
          window.requestAnimationFrame(() => {
            hideLoader();
          });
          if (modalCaption.textContent.trim()) {
            modalCaption.classList.add("is-visible");
          }
        };

        container.querySelectorAll("img").forEach((img) => {
          img.addEventListener("click", () => {
            modalImg.onload = null;
            modalImg.onerror = null;

            modalImg.classList.remove("is-ready");
            modalCaption.classList.remove("is-visible");
            applyModalMediaSize(img);
            showLoader();

            const nextSrc = img.currentSrc || img.src;
            modalImg.alt = img.alt || "Expanded blog image";
            modalCaption.textContent = img.alt || "";

            if (!modal.open) {
              modal.showModal();
            }

            modalImg.src = nextSrc;
            if (modalImg.complete && modalImg.naturalWidth > 0) {
              revealModalImage();
            } else {
              modalImg.onload = revealModalImage;
              modalImg.onerror = hideLoader;
            }
          });
        });

        if (!modal.dataset.initialized) {
          closeButton.onclick = () => closeModal();
          modal.addEventListener("click", (event) => {
            if (event.target === modal) {
              closeModal();
            }
          });

          modal.addEventListener("cancel", (event) => {
            event.preventDefault();
            closeModal();
          });

          modal.addEventListener("close", () => {
            hideLoader();
            modalImg.classList.remove("is-ready");
            modalImg.onload = null;
            modalImg.onerror = null;
            modalBody.style.removeProperty("--media-w");
            modalBody.style.removeProperty("--media-h");
            modalCaption.classList.remove("is-visible");
          });

          modal.dataset.initialized = "true";
        }
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "absolute";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      function initializeCodeCopy(container) {
        if (!container) {
          return;
        }

        container.querySelectorAll("pre").forEach((pre) => {
          if (
            pre.parentElement &&
            pre.parentElement.classList.contains("code-block-shell")
          ) {
            return;
          }

          const code = pre.querySelector("code");
          if (!code) {
            return;
          }

          const wrapper = document.createElement("div");
          wrapper.className = "code-block-shell";
          pre.parentNode.insertBefore(wrapper, pre);

          const toolbar = document.createElement("div");
          toolbar.className = "code-window-bar";

          const controls = document.createElement("div");
          controls.className = "code-window-controls";
          controls.innerHTML = `
            <span class="code-window-dot close" aria-hidden="true">×</span>
            <span class="code-window-dot minimize" aria-hidden="true">−</span>
            <span class="code-window-dot maximize" aria-hidden="true">+</span>`;

          toolbar.appendChild(controls);
          wrapper.appendChild(toolbar);
          wrapper.appendChild(pre);

          const button = document.createElement("button");
          button.type = "button";
          button.className = "code-copy-button";
          button.textContent = "Copy";
          button.setAttribute("aria-label", "Copy code to clipboard");
          wrapper.appendChild(button);

          button.addEventListener("click", async () => {
            try {
              await copyText(code.innerText);
              button.textContent = "Copied";
              button.classList.add("is-copied");
              window.setTimeout(() => {
                button.textContent = "Copy";
                button.classList.remove("is-copied");
              }, 1600);
            } catch {
              button.textContent = "Failed";
              window.setTimeout(() => {
                button.textContent = "Copy";
              }, 1600);
            }
          });
        });
      }

      function getPostTags(post) {
        const content =
          `${post.title || ""} ${post.description || ""} ${post.slug || ""}`.toLowerCase();
        const tags = new Set();

        if (/ai|agentic|llm|mcp|rag|power\s*bi/.test(content)) tags.add("AI");
        if (
          /cloud|aws|terraform|kubernetes|docker|microservices|distributed/.test(
            content,
          )
        )
          tags.add("Cloud");
        if (/database|sql|excel|analytics|data/.test(content)) tags.add("Data");
        if (/react|flutter|frontend|ui|ux|web/.test(content))
          tags.add("Frontend");
        if (
          /java|node|backend|rbac|abac|webhooks|concurrency|payments/.test(
            content,
          )
        )
          tags.add("Backend");
        if (tags.size === 0) tags.add("Engineering");

        return [...tags];
      }

      function getRelatedPosts(currentPost, allPosts, limit = 3) {
        if (!Array.isArray(allPosts) || !allPosts.length) {
          return [];
        }

        const currentTags = new Set(getPostTags(currentPost));
        return allPosts
          .filter((post) => post.slug !== currentPost.slug)
          .map((post) => {
            const postTags = getPostTags(post);
            const sharedCount = postTags.filter((tag) =>
              currentTags.has(tag),
            ).length;
            const samePrimary =
              postTags[0] && currentTags.has(postTags[0]) ? 1 : 0;
            const score = sharedCount * 10 + samePrimary;
            return { post, score, postTags };
          })
          .filter((item) => item.score > 0)
          .sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            return (b.post.date || "").localeCompare(a.post.date || "");
          })
          .slice(0, limit)
          .map((item) => item.post);
      }

      function renderRelatedPosts(posts) {
        const section = document.getElementById("related-posts");
        if (!section) {
          return;
        }

        if (!posts.length) {
          section.innerHTML = "";

        }

        section.innerHTML = `
          <h2>Related posts</h2>
          <div class="related-posts-grid">
            ${posts
              .map((post) => {
                const tags = getPostTags(post);
                return `
                <article class="related-card">
                  <p class="related-meta">
                    <span>${post.displayDate || ""}</span>
                    <span aria-hidden="true">•</span>
                    <span>${tags[0]}</span>

                  <h3 class="related-title"><a href="./posts/${encodeURIComponent(post.slug)}.html">${post.title}</a></h3>
                  <p class="related-desc">${post.description || ""}</p>
                </article>`;
              })
              .join("")}
          </div>`;
      }

            <a class="blog-share-link" aria-label="Share on Reddit" title="Share on Reddit" target="_blank" rel="noopener noreferrer" href="https://www.reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}">${icons.reddit}</a>
            <a class="blog-share-link" aria-label="Share by email" title="Share by email" href="mailto:?subject=${encodedTitle}&body=${encodedDescription}%0A%0A${encodedUrl}">${icons.email}</a>
            <button type="button" class="blog-share-copy" aria-label="Copy link" title="Copy link" data-share-copy data-url="${url}">${icons.copy}</button>
          </div>`;

        const copyButton = section.querySelector("[data-share-copy]");
        if (copyButton && copyButton.dataset.bound !== "true") {
          copyButton.addEventListener("click", async () => {
            const linkToCopy = copyButton.getAttribute("data-url") || url;
            try {
              await copyText(linkToCopy);
              copyButton.setAttribute("title", "Copied");
              copyButton.setAttribute("aria-label", "Copied");
              window.setTimeout(() => {
                copyButton.setAttribute("title", "Copy link");
                copyButton.setAttribute("aria-label", "Copy link");
              }, 1500);
            } catch {
              copyButton.setAttribute("title", "Failed to copy link");
              copyButton.setAttribute("aria-label", "Failed to copy link");
              window.setTimeout(() => {
                copyButton.setAttribute("title", "Copy link");
                copyButton.setAttribute("aria-label", "Copy link");
              }, 1500);
            }
          });
          copyButton.dataset.bound = "true";
        }
      }

      // ── Main ───────────────────────────────────────────────
      async function loadPost() {
        const params = new URLSearchParams(location.search);
        const slug = params.get("post");
        const main = document.getElementById("blog-main");
        const postCacheKey = slug ? `blog-post-cache-v2:${slug}` : null;

        if (!slug) {
          main.innerHTML = `<div class="blog-error"><p>No post specified.</p><p><a href="./blogs.html">← All blogs</a></p></div>`;
          return;
        }

        let raw;
        let allPosts = [];
        try {
          const indexPromise = getBlogIndexForPage().catch(() => []);

          const cached = postCacheKey
            ? sessionStorage.getItem(postCacheKey)
            : null;
          if (cached) {
            const parsed = JSON.parse(cached);
            if (parsed && typeof parsed.body === "string") {
              raw = parsed.body;
            }
          }

          const postPromise = raw
            ? Promise.resolve(raw)
            : fetch(`./posts/${slug}.md`).then(async (res) => {
                if (!res.ok) throw new Error(res.status);
                const text = await res.text();
                if (postCacheKey) {
                  try {
                    sessionStorage.setItem(
                      postCacheKey,
                      JSON.stringify({ timestamp: Date.now(), body: text }),
                    );
                  } catch {
                    // ignore storage failures
                  }
                }
                return text;
              });

          [allPosts, raw] = await Promise.all([indexPromise, postPromise]);

          if (!raw) {
            throw new Error("Post body unavailable");
          }
        } catch {
          main.innerHTML = `<div class="blog-error"><p>Post not found.</p><p><a href="./blogs.html">← All blogs</a></p></div>`;
          return;
        }

        const { meta, body } = parseFrontmatter(raw);
        const indexedPost = Array.isArray(allPosts)
          ? allPosts.find((post) => post && post.slug === slug)
          : null;
        const title = (
          meta.title ||
          indexedPost?.title ||
          slugToTitle(slug) ||
          slug
        ).trim();
        const date = meta.date || "";
        const desc = (
          meta.description ||
          indexedPost?.description ||
          "Technical blog post by Manish Tiwari"
        ).trim();
        const socialTitle = (
          meta.og_title ||
          meta.ogTitle ||
          meta["og:title"] ||
          meta.twitter_title ||
          meta.twitterTitle ||
          meta["twitter:title"] ||
          title
        ).trim();
        const socialDescription = (
          meta.og_description ||
          meta.ogDescription ||
          meta["og:description"] ||
          meta.twitter_description ||
          meta.twitterDescription ||
          meta["twitter:description"] ||
          desc
        ).trim();
        const pageUrl = getPostPermalink(slug);
        const imageFromFrontmatter =
          meta.image || meta.ogImage || meta["og:image"] || "";
        const imageFromBody = extractFirstMarkdownImage(body);
        const pageImage = toAbsoluteUrl(
          imageFromFrontmatter ||
            imageFromBody ||
            "https://buildwithmanish.com/image/optimized/aiblogs-20260314-175545.webp",
          pageUrl,
        );
        const currentPost = {
          slug,
          title,
          description: desc,
          date,
        };

        // Update <title> and meta description
        document.title = `${title} · Manish Tiwari`;
        document.getElementById("page-title").textContent =
          `${title} · Manish Tiwari`;
        document.getElementById("page-desc").setAttribute("content", desc);
        document.getElementById("page-canonical").setAttribute("href", pageUrl);
        document
          .getElementById("og-title")
          .setAttribute("content", socialTitle);
        document
          .getElementById("og-desc")
          .setAttribute("content", socialDescription);
        document.getElementById("og-url").setAttribute("content", pageUrl);
        document.getElementById("og-image").setAttribute("content", pageImage);
        document
          .getElementById("tw-title")
          .setAttribute("content", socialTitle);
        document
          .getElementById("tw-desc")
          .setAttribute("content", socialDescription);
        document.getElementById("tw-image").setAttribute("content", pageImage);

        const schemaNode = document.getElementById("post-schema");
        if (schemaNode) {
          schemaNode.textContent = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "BlogPosting",
            headline: title,
            description: desc,
            datePublished: date || undefined,
            dateModified: date || undefined,
            author: {
              "@type": "Person",
              name: "Manish Tiwari",
              url: "https://buildwithmanish.com/",
            },
            publisher: {
              "@type": "Person",
              name: "Manish Tiwari",
            },
            mainEntityOfPage: pageUrl,
            image: pageImage,
          });
        }

        // Configure marked for highlight.js
        marked.setOptions({
          highlight: (code, lang) => {
            if (lang && hljs.getLanguage(lang)) {
              return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
          },
          gfm: true,
          breaks: false,
        });

        const html = marked.parse(body);

        main.innerHTML = `
          <header class="blog-post-header">
            <p class="muted kicker">Blog</p>
            <h1>${title}</h1>
            <p class="muted">${fmtDate(date)}</p>
          </header>
          <div class="blog-post-layout">
            <nav class="blog-toc" id="blog-toc" aria-label="Table of contents"></nav>
            <article class="blog-prose" id="blog-prose">${html}</article>
            <aside class="blog-meta-col">
              <section class="blog-meta-card" aria-label="Author details">
                <p class="blog-meta-label">Author</p>
                <p class="blog-meta-value">Manish Tiwari</p>
              </section>
              <section class="blog-meta-card" aria-label="Publication date">
                <p class="blog-meta-label">Published</p>
                <p class="blog-meta-value">${fmtDate(date)}</p>
              </section>
              <section class="blog-meta-card" aria-label="Blog views">
                <p class="blog-meta-label">Views</p>
                <div class="blog-view-counter">
                  <img src="${getViewCounterBadgeSrc(pageUrl)}" alt="Blog views counter" loading="lazy" decoding="async" />
                </div>
              </section>
              <section class="blog-meta-card" aria-label="Blog navigation">
                <p class="blog-meta-label">Navigate</p>
                <a class="blog-meta-link" href="./blogs.html">← All posts</a>
              </section>
            </aside>
          </div>
          <section class="surface related-posts" id="related-posts" aria-label="Related blog posts"></section>
          <section class="surface blog-share" id="blog-share" aria-label="Share this post"></section>
          <div class="surface" style="padding-top:0">
            <a href="./blogs.html">← Back to all blogs</a>
          </div>`;

        // Syntax highlight any un-highlighted code blocks
        document
          .querySelectorAll("pre code:not(.hljs)")
          .forEach((b) => hljs.highlightElement(b));

        const prose = document.getElementById("blog-prose");
        initializeCodeCopy(prose);
        initializeImageModal(prose);

        // Build and inject TOC
        const toc = document.getElementById("blog-toc");
        toc.innerHTML = buildToc(prose);
        initTocScroll(toc);

        const relatedPosts = getRelatedPosts(currentPost, allPosts, 3);
        renderRelatedPosts(relatedPosts);
        renderShareActions({
          url: pageUrl,
          title: socialTitle,
          description: socialDescription,
        });

        // Dark mode hljs stylesheet swap
        function syncHljs() {
          const dark =
            document.documentElement.getAttribute("data-theme") === "dark";
          document.getElementById("hljs-theme-light").disabled = dark;
          document.getElementById("hljs-theme-dark").disabled = !dark;
        }
        syncHljs();
        new MutationObserver(syncHljs).observe(document.documentElement, {
          attributes: true,
          attributeFilter: ["data-theme"],
        });
      }

      loadPost();
    </script>
  </body>
</html>
