    <script>
      // ── Frontmatter parser ────────────────────────────────
      function parseFrontmatter(text) {
        const m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
        if (!m) return { meta: {}, body: text };
        const meta = {};
        m[1].split("\n").forEach((line) => {
          const idx = line.indexOf(":");
          if (idx === -1) return;
          const key = line.slice(0, idx).trim();
          const val = line
            .slice(idx + 1)
            .trim()
            .replace(/^"|"$/g, "");
          meta[key] = val;
        });
        return { meta, body: m[2] };
      }

      // ── Format date ────────────────────────────────────────
      function fmtDate(iso) {
        try {
          return new Date(iso + "T00:00:00").toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        } catch {
          return iso;
        }
      }

      function slugToTitle(slug) {
        return (slug || "")
          .replace(/[-_]+/g, " ")
          .replace(/\b\w/g, (m) => m.toUpperCase());
      }

      function toAbsoluteUrl(value, baseUrl = window.location.href) {
        if (!value) {
          return "";
        }

        try {
          return new URL(value, baseUrl).href;
        } catch {
          return value;
        }
      }

      function extractFirstMarkdownImage(markdown = "") {
        const imageMatch = markdown.match(
          /!\[[^\]]*\]\(([^)\s]+)(?:\s+"[^"]*")?\)/,
        );
        return imageMatch ? imageMatch[1].trim() : "";
      }

      function getPostPermalink(slug) {
        return `https://buildwithmanish.com/posts/${encodeURIComponent(slug)}.html`;
      }

      function getViewCounterBadgeSrc(pageUrl) {
        const endpoint = "https://hitscounter.dev/api/hit";
        const params = new URLSearchParams({
          url: pageUrl,
          label: "blog views",
          icon: "eye",
          color: "#198754",
          message: "",
          style: "flat",
          tz: "Indian/Christmas",
        });
        return `${endpoint}?${params.toString()}`;
      }

      function readSessionJson(key) {
        try {
          const raw = sessionStorage.getItem(key);
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      }

      function writeSessionJson(key, value) {
        try {
          sessionStorage.setItem(key, JSON.stringify(value));
        } catch {
          // ignore storage failures
        }
      }

      async function getBlogIndexForPage() {
        const cacheKey = "blog-index-cache-v2";
        const ttlMs = 5 * 60 * 1000;
        const cached = readSessionJson(cacheKey);
        const now = Date.now();

        if (
          cached &&
          Array.isArray(cached.data) &&
          now - cached.timestamp < ttlMs
        ) {
          return cached.data;
        }

        const response = await fetch("./posts/index.json");
        if (!response.ok) {
          throw new Error("Failed to load blog index");
        }

        const posts = await response.json();
        writeSessionJson(cacheKey, { timestamp: now, data: posts });
        return posts;
      }

      // ── Build TOC from rendered HTML ───────────────────────
      function buildToc(container) {
        const headings = [...container.querySelectorAll("h2, h3")];
        if (headings.length < 2) return "";
        const items = headings.map((h) => {
          const id =
            h.id ||
            h.textContent
              .trim()
              .toLowerCase()
              .replace(/[^\w]+/g, "-");
          h.id = id;
          const cls = h.tagName === "H3" ? ' class="toc-h3"' : "";
          return `<li${cls}><a href="#${id}">${h.textContent}</a></li>`;
        });
        return `<p class="blog-toc-title">Contents</p><ol>${items.join("")}</ol>`;
      }

      // ── Active TOC highlight on scroll ────────────────────
      function initTocScroll(toc) {
        const links = [...toc.querySelectorAll("a")];
        if (!links.length) return;
        const obs = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                links.forEach((l) => l.classList.remove("active"));
                const active = links.find(
                  (l) => l.getAttribute("href") === "#" + e.target.id,
                );
                if (active) active.classList.add("active");
              }
            });
          },
          { rootMargin: "-60px 0px -70% 0px" },
        );
        document
          .querySelectorAll("h2[id], h3[id]")
          .forEach((h) => obs.observe(h));
      }

      function initializeImageModal(container) {
        if (window.initializeImageModal) {
          window.initializeImageModal(container);
        }
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "absolute";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      function initializeCodeCopy(container) {
        if (window.initializeCodeCopy) {
          window.initializeCodeCopy(container);
        }
      }

      function getPostTags(post) {
        const content =
          `${post.title || ""} ${post.description || ""} ${post.slug || ""}`.toLowerCase();
        const tags = new Set();

        if (/ai|agentic|llm|mcp|rag|power\s*bi/.test(content)) tags.add("AI");
        if (
          /cloud|aws|terraform|kubernetes|docker|microservices|distributed/.test(
            content,
          )
        )
          tags.add("Cloud");
        if (/database|sql|excel|analytics|data/.test(content)) tags.add("Data");
        if (/react|flutter|frontend|ui|ux|web/.test(content))
          tags.add("Frontend");
        if (
          /java|node|backend|rbac|abac|webhooks|concurrency|payments/.test(
            content,
          )
        )
          tags.add("Backend");
        if (tags.size === 0) tags.add("Engineering");

        return [...tags];
      }

      function getRelatedPosts(currentPost, allPosts, limit = 3) {
        if (!Array.isArray(allPosts) || !allPosts.length) {
          return [];
        }

        const currentTags = new Set(getPostTags(currentPost));
        return allPosts
          .filter((post) => post.slug !== currentPost.slug)
          .map((post) => {
            const postTags = getPostTags(post);
            const sharedCount = postTags.filter((tag) =>
              currentTags.has(tag),
            ).length;
            const samePrimary =
              postTags[0] && currentTags.has(postTags[0]) ? 1 : 0;
            const score = sharedCount * 10 + samePrimary;
            return { post, score, postTags };
          })
          .filter((item) => item.score > 0)
          .sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            return (b.post.date || "").localeCompare(a.post.date || "");
          })
          .slice(0, limit)
          .map((item) => item.post);
      }

      function renderRelatedPosts(posts) {
        const section = document.getElementById("related-posts");
        if (!section) {
          return;
        }

        if (!posts.length) {
          section.innerHTML = "";
          return;
        }

        section.innerHTML = `
          <h2>Related posts</h2>
          <div class="related-posts-grid">
            ${posts
              .map((post) => {
                const tags = getPostTags(post);
                return `
                <article class="related-card">
                  <p class="related-meta">
                    <span>${post.displayDate || ""}</span>
                    <span aria-hidden="true">•</span>
                    <span>${tags[0]}</span>
                  </p>
                  <h3 class="related-title"><a href="./blog.html?post=${encodeURIComponent(post.slug)}">${post.title}</a></h3>
                  <p class="related-desc">${post.description || ""}</p>
                </article>`;
              })
              .join("")}
          </div>`;
      }

      function renderShareActions(params) {
        if (window.renderShareActions) {
          window.renderShareActions(params);
        }
      }

      // ── Main ───────────────────────────────────────────────
      async function loadPost() {
        const params = new URLSearchParams(location.search);
        const slug = params.get("post");
        const main = document.getElementById("blog-main");
        const postCacheKey = slug ? `blog-post-cache-v2:${slug}` : null;
        const indexPromise = getBlogIndexForPage().catch(() => []);

        if (main) {
          main.classList.add("is-loading");
        }

        if (!slug) {
          main.innerHTML = `<div class="blog-error"><p>No post specified.</p><p><a href="./blogs.html">← All blogs</a></p></div>`;
          main.classList.remove("is-loading");
          return;
        }

        let raw;
        try {
          const cached = postCacheKey
            ? sessionStorage.getItem(postCacheKey)
            : null;
          if (cached) {
            const parsed = JSON.parse(cached);
            if (parsed && typeof parsed.body === "string") {
              raw = parsed.body;
            }
          }

          if (!raw) {
            const res = await fetch(`./posts/${slug}.md`);
            if (!res.ok) throw new Error(res.status);
            raw = await res.text();
            if (postCacheKey) {
              try {
                sessionStorage.setItem(
                  postCacheKey,
                  JSON.stringify({ timestamp: Date.now(), body: raw }),
                );
              } catch {
                // ignore storage failures
              }
            }
          }

          if (!raw) {
            throw new Error("Post body unavailable");
          }
        } catch {
          main.innerHTML = `<div class="blog-error"><p>Post not found.</p><p><a href="./blogs.html">← All blogs</a></p></div>`;
          main.classList.remove("is-loading");
          return;
        }

        const { meta, body } = parseFrontmatter(raw);
        const indexedPost = null;
        const title = (
          meta.title ||
          indexedPost?.title ||
          slugToTitle(slug) ||
          slug
        ).trim();
        const date = meta.date || "";
        const desc = (
          meta.description ||
          indexedPost?.description ||
          "Technical blog post by Manish Tiwari"
        ).trim();
        const socialTitle = (
          meta.og_title ||
          meta.ogTitle ||
          meta["og:title"] ||
          meta.twitter_title ||
          meta.twitterTitle ||
          meta["twitter:title"] ||
          title
        ).trim();
        const socialDescription = (
          meta.og_description ||
          meta.ogDescription ||
          meta["og:description"] ||
          meta.twitter_description ||
          meta.twitterDescription ||
          meta["twitter:description"] ||
          desc
        ).trim();
        const pageUrl = getPostPermalink(slug);
        const imageFromFrontmatter =
          meta.image || meta.ogImage || meta["og:image"] || "";
        const imageFromBody = extractFirstMarkdownImage(body);
        const pageImage = toAbsoluteUrl(
          imageFromFrontmatter ||
            imageFromBody ||
            "https://buildwithmanish.com/image/optimized/aiblogs-20260314-175545.webp",
          pageUrl,
        );
        const currentPost = {
          slug,
          title,
          description: desc,
          date,
        };

        // Update <title> and meta description
        document.title = `${title} · Manish Tiwari`;
        document.getElementById("page-title").textContent =
          `${title} · Manish Tiwari`;
        document.getElementById("page-desc").setAttribute("content", desc);
        document.getElementById("page-canonical").setAttribute("href", pageUrl);
        document
          .getElementById("og-title")
          .setAttribute("content", socialTitle);
        document
          .getElementById("og-desc")
          .setAttribute("content", socialDescription);
        document.getElementById("og-url").setAttribute("content", pageUrl);
        document.getElementById("og-image").setAttribute("content", pageImage);
        document
          .getElementById("tw-title")
          .setAttribute("content", socialTitle);
        document
          .getElementById("tw-desc")
          .setAttribute("content", socialDescription);
        document.getElementById("tw-image").setAttribute("content", pageImage);

        const schemaNode = document.getElementById("post-schema");
        if (schemaNode) {
          schemaNode.textContent = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "BlogPosting",
            headline: title,
            description: desc,
            datePublished: date || undefined,
            dateModified: date || undefined,
            author: {
              "@type": "Person",
              name: "Manish Tiwari",
              url: "https://buildwithmanish.com/",
            },
            publisher: {
              "@type": "Person",
              name: "Manish Tiwari",
            },
            mainEntityOfPage: pageUrl,
            image: pageImage,
          });
        }

        // Configure marked for highlight.js
        marked.setOptions({
          highlight: (code, lang) => {
            if (lang && hljs.getLanguage(lang)) {
              return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
          },
          gfm: true,
          breaks: false,
        });

        const html = marked.parse(body);

        main.innerHTML = `
          <header class="blog-post-header">
            <p class="muted kicker">Blog</p>
            <h1>${title}</h1>
            <p class="muted">${fmtDate(date)}</p>
          </header>
          <div class="blog-post-layout">
            <nav class="blog-toc" id="blog-toc" aria-label="Table of contents"></nav>
            <article class="blog-prose" id="blog-prose">${html}</article>
            <aside class="blog-meta-col">
              <section class="blog-meta-card" aria-label="Author details">
                <p class="blog-meta-label">Author</p>
                <p class="blog-meta-value">Manish Tiwari</p>
              </section>
              <section class="blog-meta-card" aria-label="Publication date">
                <p class="blog-meta-label">Published</p>
                <p class="blog-meta-value">${fmtDate(date)}</p>
              </section>
              <section class="blog-meta-card" aria-label="Blog views">
                <p class="blog-meta-label">Views</p>
                <div class="blog-view-counter">
                  <img src="${getViewCounterBadgeSrc(pageUrl)}" alt="Blog views counter" loading="lazy" decoding="async" />
                </div>
              </section>
              <section class="blog-meta-card" aria-label="Blog navigation">
                <p class="blog-meta-label">Navigate</p>
                <a class="blog-meta-link" href="/blogs.html">← All posts</a>
              </section>
            </aside>
          </div>
          <section class="surface related-posts" id="related-posts" aria-label="Related blog posts"></section>
          <section class="surface blog-share" id="blog-share" aria-label="Share this post"></section>
          <div class="surface" style="padding-top:0">
            <a href="/blogs.html">← Back to all blogs</a>
          </div>`;

        // Syntax highlight any un-highlighted code blocks
        document
          .querySelectorAll("pre code:not(.hljs)")
          .forEach((b) => hljs.highlightElement(b));

        const prose = document.getElementById("blog-prose");
        initializeCodeCopy(prose);
        initializeImageModal(prose);

        // Build and inject TOC
        const toc = document.getElementById("blog-toc");
        toc.innerHTML = buildToc(prose);
        initTocScroll(toc);

        indexPromise
          .then((allPosts) => {
            const relatedPosts = getRelatedPosts(currentPost, allPosts, 3);
            renderRelatedPosts(relatedPosts);
          })
          .catch(() => {
            renderRelatedPosts([]);
          });
        renderShareActions({
          url: pageUrl,
          title: socialTitle,
          description: socialDescription,
        });

        // Dark mode hljs stylesheet swap
        function syncHljs() {
          const dark =
            document.documentElement.getAttribute("data-theme") === "dark";
          document.getElementById("hljs-theme-light").disabled = dark;
          document.getElementById("hljs-theme-dark").disabled = !dark;
        }
        syncHljs();
        new MutationObserver(syncHljs).observe(document.documentElement, {
          attributes: true,
          attributeFilter: ["data-theme"],
        });

        main.classList.remove("is-loading");
      }

      loadPost();
    </script>
  </body>
</html>
